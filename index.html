<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naitrika Real Estates</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --text:#fff;
  --glass:rgba(255,255,255,0.06);
  --gold:#d4af37;
}

.light{
  --bg:#f5f5f5;
  --text:#111;
  --glass:rgba(0,0,0,0.05);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.4s;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  backdrop-filter:blur(20px);
  background:var(--glass);
}

.logo{
  font-family:'Playfair Display',serif;
  color:var(--gold);
}

nav ul{
  display:flex;
  list-style:none;
  gap:20px;
  align-items:center;
}

.switch{
  width:50px;height:25px;
  background:#333;border-radius:50px;
  cursor:pointer;position:relative;
}
.switch::before{
  content:'';position:absolute;
  width:20px;height:20px;
  background:#fff;border-radius:50%;
  top:2.5px;left:3px;
  transition:0.3s;
}
.light .switch{background:#ddd;}
.light .switch::before{transform:translateX(24px);background:#000;}

section{padding:60px 20px;text-align:center;}

.hero h1{
  font-size:50px;
  color:var(--gold);
}

/* GLASS */
.glass{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
}

/* FORM */
.form{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.form input,.form textarea{
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:10px;
}

.form button{
  background:var(--gold);
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.info{padding:10px;}
.dimension{color:var(--gold);}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#fff;
  color:#000;
  width:90%;
  max-width:500px;
  border-radius:15px;
  overflow:hidden;
  position:relative;
}

.modal-box img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.modal-content{padding:15px;}

.close{
  position:absolute;
  top:10px;
  right:10px;
  background:#000;
  color:#fff;
  padding:5px 10px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <div class="logo">NAITRIKA</div>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#upload">Upload</a></li>
    <li><a href="#gallery">Properties</a></li>
    <li><div class="switch" onclick="toggleTheme()"></div></li>
  </ul>
</nav>

<section class="hero">
  <h1>Naitrika Real Estates</h1>
  <p>From Land To Luxury Living</p>
</section>

<!-- UPLOAD FORM -->
<section id="upload">
  <h2>Add Property</h2>
  <div class="form glass">
    <input type="file" id="image">
    <input type="text" id="title" placeholder="Property Title">
    <input type="text" id="size" placeholder="Sq.ft">
    <textarea id="desc" placeholder="Description"></textarea>
    <button onclick="addProperty()">Upload Property</button>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <h2>Properties</h2>
  <div class="grid" id="grid"></div>
</section>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box" id="modalBox">
    <span class="close" onclick="closeModal()">✖</span>
    <img id="modalImg">
    <div class="modal-content">
      <h2 id="mTitle"></h2>
      <p id="mSize"></p>
      <p id="mDesc"></p>
    </div>
  </div>
</div>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}

const grid=document.getElementById("grid");
const modal=document.getElementById("modal");

function addProperty(){
  const file=document.getElementById("image").files[0];
  const title=document.getElementById("title").value;
  const size=document.getElementById("size").value;
  const desc=document.getElementById("desc").value;

  if(!file) return alert("Upload image");

  const reader=new FileReader();
  reader.onload=function(e){

    const card=document.createElement("div");
    card.className="card glass";

    card.innerHTML=`
      <img src="${e.target.result}">
      <div class="info">
        <div class="dimension">${size} sq.ft</div>
        <div>${title}</div>
      </div>
    `;

    card.onclick=()=>{
      document.getElementById("modalImg").src=e.target.result;
      document.getElementById("mTitle").innerText=title;
      document.getElementById("mSize").innerText=size+" sq.ft";
      document.getElementById("mDesc").innerText=desc;
      modal.style.display="flex";
    };

    grid.appendChild(card);
  };

  reader.readAsDataURL(file);
}

function closeModal(){
  modal.style.display="none";
}

/* click outside */
modal.addEventListener("click",(e)=>{
  if(e.target===modal){
    closeModal();
  }
});
</script>

</body>
</html>
