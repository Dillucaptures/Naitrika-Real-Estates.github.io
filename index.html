<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naitrika Real Estates</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  /* DARK DEFAULT */
  --bg:#0a0a0a;
  --text:#ffffff;
  --glass:rgba(255,255,255,0.06);
  --glass-strong:rgba(255,255,255,0.12);
  --gold:#d4af37;
}

/* LIGHT MODE */
.light{
  --bg:#f5f5f5;
  --text:#111;
  --glass:rgba(0,0,0,0.05);
  --glass-strong:rgba(0,0,0,0.1);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.4s;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation:fadeOut 0.8s ease 1.3s forwards;
}

#intro h1{
  font-family:'Playfair Display',serif;
  font-size:42px;
  background:linear-gradient(90deg,#d4af37,#fff,#d4af37);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 1.5s linear infinite;
}

@keyframes shine{
  0%{background-position:-200%;}
  100%{background-position:200%;}
}
@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  backdrop-filter:blur(25px);
  background:var(--glass);
  border-bottom:1px solid var(--glass-strong);
  position:sticky;
  top:0;
}

.logo{
  font-family:'Playfair Display',serif;
  color:var(--gold);
}

nav ul{
  display:flex;
  gap:20px;
  list-style:none;
  align-items:center;
}

nav a{
  text-decoration:none;
  color:var(--text);
}

/* SWITCH */
.switch{
  width:50px;
  height:24px;
  position:relative;
}

.switch input{display:none;}

.slider{
  position:absolute;
  inset:0;
  background:#555;
  border-radius:50px;
  cursor:pointer;
  transition:0.3s;
}

.slider:before{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  top:3px;
  left:4px;
  background:#fff;
  border-radius:50%;
  transition:0.3s;
}

input:checked + .slider{
  background:var(--gold);
}

input:checked + .slider:before{
  transform:translateX(24px);
}

/* SECTIONS */
section{
  padding:70px 20px;
  text-align:center;
}

.hero h1{
  font-size:60px;
  color:var(--gold);
}

.hero p{
  font-size:22px;
}

/* GLASS */
.glass{
  background:var(--glass);
  backdrop-filter:blur(30px);
  border:1px solid var(--glass-strong);
  border-radius:20px;
  transition:0.4s;
}

.glass:hover{
  transform:translateY(-5px);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.info{padding:12px;}
.dimension{color:var(--gold);}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#fff;
  color:#000;
  width:90%;
  max-width:500px;
  border-radius:15px;
  overflow:hidden;
}

.modal-box img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.modal-content{padding:15px;}

.close{
  position:absolute;
  top:15px;
  right:20px;
  color:white;
  cursor:pointer;
}

/* CONTACT */
.contact-box{
  max-width:400px;
  margin:auto;
  padding:25px;
}

.contact-box a{
  display:block;
  margin:10px;
  color:var(--gold);
}
</style>
</head>

<body>

<div id="intro">
  <h1>Naitrika Real Estates</h1>
</div>

<nav>
  <div class="logo">NAITRIKA</div>

  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Properties</a></li>
    <li><a href="#">Contact</a></li>

    <!-- TOGGLE BESIDE CONTACT -->
    <li>
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
    </li>
  </ul>
</nav>

<section class="hero">
  <h1>Naitrika Real Estates</h1>
  <p>From Land To Luxury Living</p>
</section>

<section>
  <h2>Properties</h2>
  <div class="grid" id="grid"></div>
</section>

<section>
  <div class="contact-box glass">
    <a href="tel:+919999999999">📞 Call</a>
    <a href="https://wa.me/919999999999">💬 WhatsApp</a>
  </div>
</section>

<!-- MODAL -->
<div id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <div class="modal-box">
    <img id="modalImg">
    <div class="modal-content">
      <h2 id="title"></h2>
      <p id="size"></p>
      <p id="desc"></p>
    </div>
  </div>
</div>

<script>
/* FORCE DARK DEFAULT */
document.body.classList.remove("light");

/* TOGGLE FIX */
const toggle = document.getElementById("themeToggle");

toggle.addEventListener("change", () => {
  document.body.classList.toggle("light");
});

/* 20 PROPERTY DATA */
const properties = Array.from({length:20}, (_,i)=>({
  img:"images/plot1.jpg"
  size:`${1200 + i*50} sq.ft`,
  desc:`Premium property #${i+1}`
}));

const grid=document.getElementById("grid");

properties.forEach((p,i)=>{
  const card=document.createElement("div");
  card.className="glass";

  card.innerHTML=`
    <img src="${p.img}">
    <div class="info">
      <div class="dimension">${p.size}</div>
      <div>${p.desc}</div>
    </div>
  `;

  card.onclick=()=>openModal(p,i+1);
  grid.appendChild(card);
});

function openModal(p,id){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=p.img;
  document.getElementById("title").innerText="Property #"+id;
  document.getElementById("size").innerText=p.size;
  document.getElementById("desc").innerText=p.desc;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* CLICK OUTSIDE CLOSE */
document.getElementById("modal").addEventListener("click",(e)=>{
  if(e.target.id==="modal") closeModal();
});
</script>

</body>
</html>
