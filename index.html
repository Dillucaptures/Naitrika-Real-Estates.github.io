<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naitrika Real Estates</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0a0a0a;color:#fff}
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;padding:15px 30px;background:rgba(255,255,255,0.08);backdrop-filter:blur(20px)}
nav a{color:#fff;text-decoration:none;margin:0 10px}
section{padding:100px 30px}
.hero{height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1600') center/cover}

.gallery{column-count:4;column-gap:15px}
@media(max-width:1000px){.gallery{column-count:2}}
@media(max-width:600px){.gallery{column-count:1}}

.g-box{break-inside:avoid;margin-bottom:15px;position:relative}
.g-box img{width:100%;border-radius:12px}
.g-info{position:absolute;bottom:0;width:100%;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,0.8));opacity:0;transition:.3s}
.g-box:hover .g-info{opacity:1}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center}
.modal img{max-width:90%;border-radius:10px}
.modal button{margin:10px;padding:10px}

</style>
</head>
<body>

<nav>
<h2>Naitrika Real Estates</h2>
<div>
<a href="#home">Home</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</div>
</nav>

<section id="home" class="hero">
<h1>From Land To Luxury Living</h1>
</section>

<section id="gallery">
<h2>Gallery</h2>
<div class="gallery">

<!-- MANUAL IMAGE BLOCK (EDIT HERE) -->
<div class="g-box">
<img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994?q=80&w=1200">
<div class="g-info">
<h4>Villa 1</h4>
<p>₹2.5 Cr • 3200 sq.ft</p>
<button onclick="openModal(this)">View</button>
</div>
</div>

<div class="g-box">
<img src="https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=1200">
<div class="g-info"><h4>Apartment</h4><p>₹1.2 Cr • 1800 sq.ft</p><button onclick="openModal(this)">View</button></div>
</div>

<div class="g-box">
<img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be?q=80&w=1200">
<div class="g-info"><h4>House</h4><p>₹3 Cr • 4000 sq.ft</p><button onclick="openModal(this)">View</button></div>
</div>

<!-- COPY ABOVE BLOCK TO ADD MORE IMAGES -->

</div>
</section>

<section id="contact">
<h2>Contact</h2>
<button onclick="callNow()">Call</button>
<button onclick="contactWhatsApp()">WhatsApp</button>
</section>

<div class="modal" id="modal">
<div>
<img id="modalImg">
<br>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>
let phone="+919999999999";

function openModal(btn){
let box=btn.closest('.g-box');
modal.style.display='flex';
modalImg.src=box.querySelector('img').src;
}
function closeModal(){modal.style.display='none'}
function callNow(){window.location.href=`tel:${phone}`}
function contactWhatsApp(){window.open(`https://wa.me/${phone}`)}
</script>

</body>
</html>
