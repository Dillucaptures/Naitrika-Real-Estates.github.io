<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Naitrika Real Estates</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root{
  --bg:#0a0a0a;
  --text:#ffffff;
  --glass:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.15);
  --gold:#d4af37;
}

/* LIGHT MODE */
.light{
  --bg:#f5f5f5;
  --text:#111;
  --glass:rgba(0,0,0,0.05);
  --border:rgba(0,0,0,0.1);
}

/* ================= BODY ================= */
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#1a1a1a,#000);
  color:var(--text);
  transition:0.4s;
}

/* ================= NAV ================= */
nav{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  backdrop-filter:blur(20px);
  background:var(--glass);
  border-bottom:1px solid var(--border);
  z-index:1000;
}

.logo{
  font-family:'Playfair Display';
  color:var(--gold);
  font-size:20px;
}

nav ul{
  display:flex;
  gap:20px;
  list-style:none;
}

nav a{
  color:var(--text);
  text-decoration:none;
}

/* TOGGLE */
.switch{
  width:50px;height:24px;position:relative;
}
.switch input{display:none;}
.slider{
  position:absolute;inset:0;
  background:#555;border-radius:50px;
  cursor:pointer;
}
.slider:before{
  content:"";
  position:absolute;
  width:18px;height:18px;
  top:3px;left:4px;
  background:white;border-radius:50%;
  transition:0.3s;
}
input:checked + .slider{
  background:var(--gold);
}
input:checked + .slider:before{
  transform:translateX(24px);
}

/* ================= HERO ================= */
.hero{
  text-align:center;
  padding:100px 20px;
}
.hero h1{
  font-size:60px;
  color:var(--gold);
}
.hero p{
  font-size:22px;
}

/* ================= GLASS ================= */
.glass{
  background:var(--glass);
  backdrop-filter:blur(25px);
  border:1px solid var(--border);
  border-radius:20px;
  transition:0.3s;
}
.glass:hover{
  transform:translateY(-6px);
}

/* ================= GALLERY ================= */
.gallery{
  padding:40px 20px;
}

/* 5 ROW LAYOUT */
.grid{
  display:grid;
  grid-template-rows:repeat(5,auto);
  grid-auto-flow:column;
  grid-auto-columns:280px;
  gap:20px;
  overflow-x:auto;
  padding-bottom:10px;
}

/* CARD */
.card{
  cursor:pointer;
  overflow:hidden;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

/* INFO */
.info{
  padding:12px;
  text-align:left;
}

.price{
  color:var(--gold);
  font-weight:bold;
}

/* ================= CONTACT ================= */
.contact{
  text-align:center;
  padding:60px 20px;
}

.contact a{
  display:inline-block;
  margin:10px;
  padding:12px 18px;
  border-radius:25px;
  background:var(--gold);
  color:#000;
  text-decoration:none;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .hero h1{font-size:38px;}
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">NAITRIKA</div>

  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Properties</a></li>
    <li><a href="#">Contact</a></li>

    <li>
      <label class="switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
      </label>
    </li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Naitrika Real Estates</h1>
  <p>From Land To Luxury Living</p>
</section>

<!-- GALLERY -->
<section class="gallery">
  <h2 style="text-align:center;">Our Properties</h2>

  <div class="grid" id="grid"></div>
</section>

<!-- CONTACT -->
<section class="contact">
  <h2>Contact Us</h2>
  <a href="tel:+919999999999">📞 Call</a>
  <a href="https://wa.me/919999999999">💬 WhatsApp</a>
</section>

<script>

/* THEME TOGGLE */
document.getElementById("toggle").addEventListener("change",()=>{
  document.body.classList.toggle("light");
});

/* PROPERTY DATA (EDIT HERE) */
const properties = [
  {img:"images/p1.jpg", title:"Premium Plot", size:"1200 sq.ft", price:"₹25 Lakhs", loc:"Hyderabad"},
  {img:"images/p2.jpg", title:"Luxury Villa", size:"2000 sq.ft", price:"₹80 Lakhs", loc:"Bangalore"},
  {img:"images/p3.jpg", title:"Modern House", size:"1500 sq.ft", price:"₹50 Lakhs", loc:"Chennai"},
  {img:"images/p4.jpg", title:"Gated Community", size:"1800 sq.ft", price:"₹65 Lakhs", loc:"Vizag"},
  {img:"images/p5.jpg", title:"Farm Land", size:"3000 sq.ft", price:"₹20 Lakhs", loc:"Vijayawada"},

  /* duplicate for demo (add unlimited) */
  {img:"images/p6.jpg", title:"Plot", size:"1300 sq.ft", price:"₹30 Lakhs", loc:"City"},
  {img:"images/p7.jpg", title:"Villa", size:"2100 sq.ft", price:"₹90 Lakhs", loc:"City"},
  {img:"images/p8.jpg", title:"House", size:"1600 sq.ft", price:"₹55 Lakhs", loc:"City"},
  {img:"images/p9.jpg", title:"Project", size:"1700 sq.ft", price:"₹60 Lakhs", loc:"City"},
  {img:"images/p10.jpg", title:"Estate", size:"2500 sq.ft", price:"₹1 Cr", loc:"City"}
];

/* RENDER */
const grid=document.getElementById("grid");

properties.forEach(p=>{
  const card=document.createElement("div");
  card.className="card glass";

  card.innerHTML=`
    <img src="${p.img}">
    <div class="info">
      <div class="price">${p.price}</div>
      <div><b>${p.title}</b></div>
      <div>${p.size}</div>
      <div>${p.loc}</div>
    </div>
  `;

  grid.appendChild(card);
});

</script>

</body>
</html>
