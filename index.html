<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naitrika Real Estates</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0a0a0a;color:#fff}

nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;padding:15px 30px;background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);z-index:1000}
nav a{color:#fff;text-decoration:none;margin:0 10px}
section{padding:100px 30px}

.hero{height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1600') center/cover}

.gallery{column-count:4;column-gap:15px}
@media(max-width:1000px){.gallery{column-count:2}}
@media(max-width:600px){.gallery{column-count:1}}

.g-box{break-inside:avoid;margin-bottom:15px;cursor:pointer;position:relative}
.g-box img{width:100%;border-radius:12px}
.g-desc{
position:absolute;
bottom:0;
left:0;
right:0;
padding:10px;
background:linear-gradient(transparent,rgba(0,0,0,0.8));
font-size:13px;
}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:2000}
.modal-content{position:relative;max-width:90%;max-height:90%;text-align:center}
.modal img{width:100%;border-radius:12px}
.modal h3{margin-top:10px}
.modal p{color:#ccc;margin-top:5px}
.close-btn{position:absolute;top:-40px;right:0;background:#fff;color:#000;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}

footer{text-align:center;padding:30px;background:#000}
</style>
</head>
<body>

<nav>
<h2>Naitrika Real Estates</h2>
<div>
<a href="#home">Home</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</div>
</nav>

<section id="home" class="hero">
<h1>From Land To Luxury Living</h1>
</section>

<section id="gallery">
<h2>Gallery</h2>
<div class="gallery">

<!-- PROPERTY ITEM -->
<div class="g-box" onclick="openModal(this)">
<img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994?q=80&w=1200">
<div class="g-desc">
<strong>Luxury Villa</strong><br>
₹2.5 Cr • 4 BHK • 3200 sq.ft
</div>
</div>

<div class="g-box" onclick="openModal(this)">
<img src="https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=1200">
<div class="g-desc">
<strong>Modern Apartment</strong><br>
₹1.2 Cr • 3 BHK • 1800 sq.ft
</div>
</div>

<div class="g-box" onclick="openModal(this)">
<img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be?q=80&w=1200">
<div class="g-desc">
<strong>Beach House</strong><br>
₹3 Cr • 5 BHK • 4000 sq.ft
</div>
</div>

<!-- COPY ABOVE BLOCK TO ADD MORE -->

</div>
</section>

<section id="contact">
<h2>Contact</h2>
<button onclick="callNow()">Call</button>
<button onclick="contactWhatsApp()">WhatsApp</button>
</section>

<div class="modal" id="modal">
<div class="modal-content">
<button class="close-btn" onclick="closeModal()">Close ✕</button>
<img id="modalImg">
<h3 id="modalTitle"></h3>
<p id="modalDesc"></p>
</div>
</div>

<footer>© 2026 Naitrika Real Estates</footer>

<script>
let phone="+919999999999";

function openModal(el){
let img=el.querySelector('img').src;
let title=el.querySelector('strong').innerText;
let desc=el.querySelector('.g-desc').innerText;

document.getElementById('modal').style.display='flex';
document.getElementById('modalImg').src=img;
document.getElementById('modalTitle').innerText=title;
document.getElementById('modalDesc').innerText=desc;
}

function closeModal(){document.getElementById('modal').style.display='none'}
function callNow(){window.location.href=`tel:${phone}`}
function contactWhatsApp(){window.open(`https://wa.me/${phone}`)}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
</script>

</body>
</html>
