<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naitrika Real Estate</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg: #0b0b0c;
  --text: #ffffff;
  --card: rgba(255,255,255,0.05);
  --accent: #c8a96a;
}

.light{
  --bg: #f5f5f5;
  --text: #111;
  --card: rgba(0,0,0,0.05);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Inter', sans-serif;
}

body{
  background: var(--bg);
  color: var(--text);
  transition:0.4s;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  backdrop-filter: blur(20px);
  position:sticky;
  top:0;
}

.logo{
  font-size:24px;
  font-weight:600;
  letter-spacing:2px;
}

.toggle{
  cursor:pointer;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-size:60px;
  font-weight:600;
}

.hero p{
  margin-top:10px;
  opacity:0.7;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  background:var(--accent);
  color:#000;
  cursor:pointer;
  border-radius:30px;
}

/* GALLERY */
.gallery{
  padding:60px;
}

.gallery h2{
  font-size:32px;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap:25px;
}

.card{
  background:var(--card);
  backdrop-filter: blur(15px);
  border-radius:20px;
  overflow:hidden;
  transition:0.4s;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.info{
  padding:15px;
}

.dimension{
  font-size:14px;
  color:var(--accent);
  margin-bottom:5px;
}

.desc{
  font-size:14px;
  opacity:0.8;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  opacity:0.6;
}

</style>
</head>

<body>

<nav>
  <div class="logo">NAITRIKA</div>
  <div class="toggle" onclick="toggleTheme()">🌗</div>
</nav>

<section class="hero">
  <div>
    <h1>Luxury Living Redefined</h1>
    <p>Discover premium plots, villas & apartments</p>
    <button class="btn">Explore Properties</button>
  </div>
</section>

<section class="gallery">
  <h2>Featured Properties</h2>

  <div class="grid">

    <!-- 20 PROPERTY CARDS -->

    <!-- REPEAT BLOCK -->
    <script>
      const container = document.currentScript.parentElement;

      for(let i=1;i<=20;i++){
        const card = document.createElement('div');
        card.className='card';

        card.innerHTML = `
          <img src="https://picsum.photos/500/300?random=${i}">
          <div class="info">
            <div class="dimension">${1200 + i*50} sq.ft</div>
            <div class="desc">
              Premium residential plot with modern surroundings,
              perfect for luxury living and investment opportunity.
            </div>
          </div>
        `;
        container.appendChild(card);
      }
    </script>

  </div>
</section>

<footer>
  © 2026 Naitrika Real Estate — Luxury Properties
</footer>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
