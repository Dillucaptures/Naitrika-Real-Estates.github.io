<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naitrika Real Estate</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg: #0b0b0c;
  --text: #ffffff;
  --card: rgba(255,255,255,0.05);
  --accent: #c8a96a;
}

.light{
  --bg: #f5f5f5;
  --text: #111;
  --card: rgba(0,0,0,0.05);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Inter', sans-serif;
}

body{
  background: var(--bg);
  color: var(--text);
  transition:0.4s;
  scroll-behavior:smooth;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  backdrop-filter: blur(20px);
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{
  font-size:24px;
  font-weight:600;
  letter-spacing:2px;
}

.toggle{
  cursor:pointer;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-size:60px;
  font-weight:600;
  animation:fadeUp 1.2s ease;
}

.hero p{
  margin-top:10px;
  opacity:0.7;
  animation:fadeUp 1.6s ease;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  background:var(--accent);
  color:#000;
  cursor:pointer;
  border-radius:30px;
  transition:0.3s;
  animation:fadeUp 2s ease;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px var(--accent);
}

/* GALLERY */
.gallery{
  padding:60px;
}

.gallery h2{
  font-size:32px;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap:25px;
}

.card{
  background:var(--card);
  backdrop-filter: blur(15px);
  border-radius:20px;
  overflow:hidden;
  transition:0.4s;
  opacity:0;
  transform:translateY(40px);
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  transition:0.5s;
}

.card:hover img{
  transform:scale(1.1);
}

.info{
  padding:15px;
}

.dimension{
  font-size:14px;
  color:var(--accent);
  margin-bottom:5px;
}

.desc{
  font-size:14px;
  opacity:0.8;
}

/* CONTACT FLOAT BUTTON */
.contact-btn{
  position:fixed;
  bottom:25px;
  right:25px;
  background:var(--accent);
  color:#000;
  padding:15px 20px;
  border-radius:50px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 5px 25px rgba(0,0,0,0.4);
  transition:0.3s;
  z-index:1000;
}

.contact-btn:hover{
  transform:scale(1.1);
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  opacity:0.6;
}

/* ANIMATIONS */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<nav>
  <div class="logo">NAITRIKA</div>
  <div class="toggle" onclick="toggleTheme()">🌗</div>
</nav>

<section class="hero">
  <div>
    <h1>Luxury Living Redefined</h1>
    <p>Discover premium plots, villas & apartments</p>
    <button class="btn">Explore Properties</button>
  </div>
</section>

<section class="gallery">
  <h2>Featured Properties</h2>

  <div class="grid" id="grid"></div>
</section>

<!-- CONTACT BUTTON -->
<div class="contact-btn" onclick="contactNow()">
  Contact Us
</div>

<footer>
  © 2026 Naitrika Real Estate — Luxury Properties
</footer>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* CREATE CARDS */
const grid = document.getElementById("grid");

for(let i=1;i<=20;i++){
  const card = document.createElement('div');
  card.className='card';

  card.innerHTML = `
    <img src="https://picsum.photos/500/300?random=${i}">
    <div class="info">
      <div class="dimension">${1200 + i*50} sq.ft</div>
      <div class="desc">
        Premium residential property with luxury surroundings and high investment value.
      </div>
    </div>
  `;
  grid.appendChild(card);
}

/* SCROLL ANIMATION */
const cards = document.querySelectorAll('.card');

window.addEventListener('scroll', () => {
  const trigger = window.innerHeight * 0.85;

  cards.forEach(card => {
    const top = card.getBoundingClientRect().top;
    if(top < trigger){
      card.classList.add('show');
    }
  });
});

/* CONTACT BUTTON ACTION */
function contactNow(){
  window.open("https://wa.me/919999999999", "_blank");
}
</script>

</body>
</html>
